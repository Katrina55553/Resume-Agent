name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH || '/root/resume-agent' }}

            echo ">>> Pulling latest code..."
            git pull origin main

            echo ">>> Building and starting services..."
            docker compose down
            docker compose up -d --build --remove-orphans

            echo ">>> Waiting for services to be healthy..."
            sleep 10

            echo ">>> Checking service status..."
            docker compose ps

            echo ">>> Checking backend health..."
            docker compose exec -T backend curl -sf http://localhost:8000/health || echo "WARNING: Backend health check failed"

            echo ">>> Deploy completed!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed! Check the SSH action logs above."
