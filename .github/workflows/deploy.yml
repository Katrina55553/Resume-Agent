name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/root/resume-agent' }}"
            cd "$DEPLOY_PATH"

            echo ">>> [1/5] 检查目录与 git 状态..."
            pwd
            git status --short
            git branch --show-current

            echo ">>> [2/5] 拉取最新代码..."
            git fetch origin
            git reset --hard origin/main
            git log --oneline -3

            echo ">>> [3/5] 检查 .env 文件是否存在..."
            if [ ! -f backend/.env ]; then
              echo "WARNING: backend/.env 不存在，使用示例模板创建基础 .env..."
              cp backend/.env.example backend/.env || true
            fi

            echo ">>> [4/5] 停止旧服务并重新构建启动..."
            docker compose down || echo "docker compose down 非致命，继续"
            docker compose up -d --build --remove-orphans

            echo ">>> [5/5] 等待 backend 健康检查通过（最多 180 秒）..."
            MAX_WAIT=180
            WAITED=0
            HEALTH_OK=0
            while [ $WAITED -lt $MAX_WAIT ]; do
              echo "  等待 ${WAITED}s/${MAX_WAIT}s - 服务状态:"
              docker compose ps --format 'table {{.Name}}\t{{.State}}\t{{.Status}}'
              if python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)" 2>/dev/null; then
                echo "  ✓ backend /health 端点响应正常"
                HEALTH_OK=1
                break
              else
                echo "  - backend 尚未就绪，继续等待..."
              fi
              sleep 10
              WAITED=$((WAITED + 10))
            done

            echo ">>> 服务状态总览:"
            docker compose ps

            echo ">>> 后端健康检查:"
            python3 -c "import urllib.request,json; r=urllib.request.urlopen('http://localhost:8000/health',timeout=10); d=json.loads(r.read()); print('status='+d.get('status','?')+', version='+d.get('version','?'))" 2>/dev/null || echo "  WARN: 健康检查失败"

            if [ "$HEALTH_OK" -eq 0 ]; then
              echo ">>> WARNING: 健康检查超时但继续 - 请手动检查服务日志"
              echo ">>> 后端最近 50 行日志:"
              docker compose logs --tail=50 backend || echo "无法获取日志"
            fi

            echo ">>> 部署完成!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed! Check the SSH action logs above."
