# Ruff 配置
target-version = "py312"
line-length = 120

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # 行长度交给 formatter 处理
    "B008",   # 允许 FastAPI Depends() 在参数默认值中
]

[lint.isort]
known-first-party = ["app"]
